# .github/workflows/deploy.yml
# Cada vez que haces push a main, esto:
# 1. Construye la imagen Docker
# 2. La sube a Google Container Registry
# 3. Actualiza el Cloud Run Job con la nueva imagen

name: Deploy CINAX a Cloud Run

on:
  push:
    branches:
      - main   # cambia a "master" si ese es tu branch principal

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Bajar el código del repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Autenticarse con Google Cloud usando las credenciales del secret
      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # 3. Configurar gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 4. Autorizar Docker para subir imágenes a GCR
      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker --quiet

      # 5. Construir la imagen Docker
      - name: Build imagen
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/cinax-bot:latest .

      # 6. Subir la imagen a Google Container Registry
      - name: Push imagen
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/cinax-bot:latest

      # 7. Actualizar el Cloud Run Job con la nueva imagen
      - name: Actualizar Cloud Run Job
        run: |
          gcloud run jobs update cinax-bot \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/cinax-bot:latest \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy exitoso
        run: echo "✅ CINAX desplegado correctamente"
